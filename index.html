<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>夢境編織者：療癒版</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Noto+Sans+TC:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #0f172a; 
            --card-front: #1e293b; 
            --accent: #818cf8; 
            --danger: #ef4444; 
            --success: #4ade80;
            --ig-color: #e1306c;
        }
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            /* 關鍵：防止手機快速點擊時縮放 */
            touch-action: manipulation; 
        }

        body { 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: white; 
            font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding-bottom: 30px; overflow-x: hidden; 
            position: relative;
        }

        /* 背景星空 */
        .stars-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }
        .star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.3; animation: twinkle var(--duration) infinite ease-in-out;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.3); } }

        /* 動畫 */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake { animation: shake 0.2s ease-in-out 0s 2; }
        .flash-red { animation: flash 0.3s; }
        @keyframes flash { 50% { background-color: #450a0a; } }
        @keyframes hpShake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-4px); } 40%, 80% { transform: translateX(4px); } }
        .hp-shake { animation: hpShake 0.4s ease-in-out; }

        .dmg-popup {
            position: fixed; color: var(--danger); font-weight: bold; font-size: 1.6rem;
            pointer-events: none; z-index: 1000; animation: floatUp 0.8s forwards;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
        }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-60px); opacity: 0; } }

        .header { text-align: center; padding: 15px; z-index: 10; }
        .header h1 { font-size: 1.8rem; text-shadow: 0 0 10px var(--accent); margin-bottom: 5px; }
        
        .stats { 
            display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; 
            background: rgba(255,255,255,0.08); padding: 15px 25px; 
            border-radius: 20px; border: 1px solid rgba(129, 140, 248, 0.4);
            align-items: center; width: 90%; max-width: 400px;
            backdrop-filter: blur(10px); z-index: 10;
        }

        .hp-container { display: flex; align-items: center; gap: 10px; width: 100%; justify-content: space-between; }
        #hp-bar { flex-grow: 1; height: 10px; background: #334155; border-radius: 10px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: var(--success); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #hp-text { font-weight: bold; font-size: 0.9rem; min-width: 45px; text-align: right; }

        .grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; 
            width: 95%; max-width: 440px; perspective: 1000px; z-index: 10;
        }

        .card { 
            aspect-ratio: 3 / 4; cursor: pointer; position: relative; 
            transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .card.flipped { transform: rotateY(180deg); }
        .card.matched { transform: rotateY(180deg) scale(0.92); opacity: 0.4; cursor: default; }

        .face { 
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; display: flex; align-items: center; 
            justify-content: center; border-radius: 12px; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.3); border: 2px solid var(--accent); 
        }
        .front { background: var(--card-front); font-size: 1.2rem; color: var(--accent); }
        .back { background: #ffffff; transform: rotateY(180deg); overflow: hidden; }
        .back img { max-width: 85%; max-height: 85%; object-fit: contain; }

        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(15, 23, 42, 0.95); 
            display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 100; text-align: center; 
            padding: 30px; box-sizing: border-box; backdrop-filter: blur(12px);
        }

        .restart-btn { 
            padding: 15px 45px; background: var(--accent); color: white; 
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
        }

        .mute-btn { margin-top: 25px; background: none; border: 1px solid #475569; color: #94a3b8; padding: 8px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>

    <div class="header">
        <h1>🌙 夢境編織者</h1>
        <p>配對夢境絲線，編織今晚的好夢</p>
    </div>

    <div class="stats" id="stats-area">
        <div class="hp-container">
            <span>修復能量</span>
            <div id="hp-bar"><div id="hp-fill"></div></div>
            <span id="hp-text">12/12</span>
        </div>
        <div style="font-size: 0.85rem; color: var(--accent); font-weight: bold;">進度: <span id="score">0</span> / 5</div>
    </div>

    <div id="grid" class="grid"></div>

    <div id="overlay">
        <h2 id="over-title" style="font-size: 2.2rem; margin-bottom: 15px;"></h2>
        <div id="over-msg" style="font-size: 1.1rem; line-height: 1.6; color: #cbd5e1; max-width: 400px; margin-bottom: 30px;"></div>
        
        <div id="easter-egg" style="display:none; margin-bottom: 25px;">
            <a href="https://www.instagram.com/exit.7_studio/" target="_blank" style="color:var(--ig-color); text-decoration:none; font-weight:bold;">📸 @exit.7_studio</a>
        </div>

        <button class="restart-btn" onclick="initGame()">再試一次</button>
    </div>
